<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>API Explorer</title>

<style>
body { font-family: sans-serif; margin: 20px; }
.endpoint {
    border: 1px solid #ccc;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 6px;
}
.method {
    font-weight: bold;
    margin-right: 10px;
}
.tryout-btn {
    margin-top: 8px;
    padding: 6px 10px;
    cursor: pointer;
}
.hidden {
    display: none;
}
.param-field {
    margin: 4px 0;
}
textarea {
    width: 100%;
    height: 120px;
}

/* collapsible sections */
.collapsible {
    cursor: pointer;
    padding: 6px;
    background: #eee;
    border-radius: 4px;
    margin-top: 10px;
    font-weight: bold;
}
.collapsible:hover {
    background: #ddd;
}
.content-collapsible {
    display: none;
    padding: 10px 0;
}

/* boxes */
.response-box, .request-box {
    white-space: pre-wrap;
    background: #f5f5f5;
    padding: 10px;
    border: 1px solid #ddd;
    margin-top: 10px;
}
.header-box {
    white-space: pre-wrap;
    background: #fafafa;
    padding: 10px;
    border: 1px solid #ccc;
    margin-top: 10px;
}

/* simple syntax highlighting */
.hl-key   { color: #aa0d91; font-weight: bold; }
.hl-str   { color: #008000; }
.hl-num   { color: #1c00cf; }
.hl-bool  { color: #aa0d91; }
.hl-null  { color: #777; font-style: italic; }
</style>
</head>

<body>

<h1>API Explorer</h1>

<div id="endpoints">Loading endpoints…</div>

<script>
/* JSON syntax highlighting */
function highlightJSON(json) {
    if (!json) return "";
    return json
        .replace(/"(.*?)"(?=\s*:)/g, '<span class="hl-key">"$1"</span>')
        .replace(/"(.*?)"/g, '<span class="hl-str">"$1"</span>')
        .replace(/\b(true|false)\b/g, '<span class="hl-bool">$1</span>')
        .replace(/\b(null)\b/g, '<span class="hl-null">$1</span>')
        .replace(/\b(\d+)\b/g, '<span class="hl-num">$1</span>');
}

/* collapsible toggle */
function toggleCollapse(el) {
    const content = el.nextElementSibling;
    content.style.display = content.style.display === "block" ? "none" : "block";
}

/* load OpenAPI */
async function loadOpenAPI() {
    const container = document.getElementById("endpoints");

    try {
        const res = await fetch("/openapi.json");
        const api = await res.json();

        container.innerHTML = "";

        const paths = api.paths || {};
        const schemas = api.components?.schemas || {};

        for (const path in paths) {
            const methods = paths[path];

            for (const method in methods) {
                const info = methods[method];

                const tryoutId = "tryout_" + Math.random().toString(36).substring(2);
                const reqId = "req_" + Math.random().toString(36).substring(2);
                const resId = "res_" + Math.random().toString(36).substring(2);

                const card = document.createElement("div");
                card.className = "endpoint";

                card.innerHTML = `
                    <div>
                        <span class="method">${method.toUpperCase()}</span>
                        <span>${path}</span>
                    </div>
                    <div>${info.summary || ""}</div>

                    <button class="tryout-btn" onclick="toggleTryout('${tryoutId}')">
                        Try out
                    </button>

                    <div id="${tryoutId}" class="hidden">
                        <h4>Parameters</h4>
                        <div class="params"></div>

                        <h4>Request Body</h4>
                        <textarea class="body-input"></textarea>

                        <button class="tryout-btn"
                            onclick="sendRequest('${method}', '${path}', '${tryoutId}', '${reqId}', '${resId}', '${resId}_headers', '${resId}_status')">
                            Send Request
                        </button>

                        <div class="collapsible" onclick="toggleCollapse(this)">Request Preview</div>
                        <div class="content-collapsible">
                            <pre id="${reqId}" class="request-box">No request yet</pre>
                        </div>

                        <div class="collapsible" onclick="toggleCollapse(this)">Response Status</div>
                        <div class="content-collapsible">
                            <pre id="${resId}_status" class="header-box">No response yet</pre>
                        </div>

                        <div class="collapsible" onclick="toggleCollapse(this)">Response Headers</div>
                        <div class="content-collapsible">
                            <pre id="${resId}_headers" class="header-box">No headers yet</pre>
                        </div>

                        <div class="collapsible" onclick="toggleCollapse(this)">Response Body</div>
                        <div class="content-collapsible">
                            <pre id="${resId}" class="response-box">No response yet</pre>
                        </div>
                    </div>
                `;

                container.appendChild(card);

                const tryoutDiv = card.querySelector(`#${tryoutId}`);
                const paramsDiv = tryoutDiv.querySelector(".params");
                const bodyInput = tryoutDiv.querySelector(".body-input");

                /* Query parameters */
                if (info.parameters && info.parameters.length > 0) {
                    info.parameters.forEach(p => {
                        if (p.in === "query") {
                            paramsDiv.innerHTML += `
                                <div class="param-field">
                                    <label>${p.name} (${p.schema?.type || "string"}${p.required ? ", required" : ""}):
                                        <input type="text" data-param="${p.name}">
                                    </label>
                                </div>
                            `;
                        }
                    });
                } else {
                    paramsDiv.innerHTML = "<i>No query parameters</i>";
                }

                /* Request body example */
                if (info.requestBody?.content?.["application/json"]) {
                    const schema = info.requestBody.content["application/json"].schema;
                    if (schema["$ref"]) {
                        const schemaName = schema["$ref"].split("/").pop();
                        const s = schemas[schemaName];
                        if (s?.properties) {
                            const example = {};
                            for (const key in s.properties) example[key] = "";
                            bodyInput.value = JSON.stringify(example, null, 2);
                        }
                    }
                }
            }
        }
    } catch (err) {
        container.textContent = "Failed to load /openapi.json: " + err;
    }
}

function toggleTryout(id) {
    document.getElementById(id).classList.toggle("hidden");
}

/* send request */
async function sendRequest(method, path, tryoutId, reqId, resId, headersId, statusId) {
    const tryoutDiv = document.getElementById(tryoutId);
    const reqBox = document.getElementById(reqId);
    const resBox = document.getElementById(resId);
    const headersBox = document.getElementById(headersId);
    const statusBox = document.getElementById(statusId);

    const params = tryoutDiv.querySelectorAll("[data-param]");
    let url = path;

    const q = new URLSearchParams();
    params.forEach(p => {
        if (p.value.trim() !== "") q.append(p.dataset.param, p.value);
    });
    const qs = q.toString();
    if (qs) url += "?" + qs;

    let body = null;
    const bodyInput = tryoutDiv.querySelector(".body-input");
    if (bodyInput && bodyInput.value.trim() !== "") {
        body = bodyInput.value;
    }

    reqBox.innerHTML = highlightJSON(
        method.toUpperCase() + " " + url + "\n\n" + (body || "(no body)")
    );

    resBox.textContent = "Loading…";
    headersBox.textContent = "Loading…";
    statusBox.textContent = "Loading…";

    try {
        const res = await fetch(url, {
            method: method.toUpperCase(),
            headers: { "Content-Type": "application/json" },
            body: method.toLowerCase() !== "get" ? body : undefined
        });

        statusBox.textContent = `${res.status} ${res.statusText}`;

        let headerText = "";
        res.headers.forEach((v, k) => headerText += `${k}: ${v}\n`);
        headersBox.textContent = headerText.trim();

        const text = await res.text();
        try {
            const json = JSON.stringify(JSON.parse(text), null, 2);
            resBox.innerHTML = highlightJSON(json);
        } catch {
            resBox.textContent = text;
        }

    } catch (err) {
        resBox.textContent = "Error: " + err;
    }
}

loadOpenAPI();
</script>

</body>
</html>
